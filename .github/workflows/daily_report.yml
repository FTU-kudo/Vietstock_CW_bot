name: Daily CW Report

on:
  schedule:
    # 16:00 giờ Việt Nam (UTC+7) = 09:00 UTC
    # Đặt phút lệch khỏi mốc :00 để tránh giờ cao điểm của GitHub Actions
    # (GitHub công bố đầu mỗi giờ là thời điểm cron dễ bị trễ nhiều nhất)
    - cron: "13 9 * * 1-5"
  workflow_dispatch:
    # Cho phép chạy thủ công từ tab Actions trên GitHub để test

permissions:
  contents: write   # cần quyền ghi để commit lại snapshot mã CW hôm nay

jobs:
  crawl-and-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily CW report
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }
          YOUR_EMAIL: ${{ secrets.YOUR_EMAIL }}
        run: python main.py

      - name: Commit updated CW codes snapshot
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/last_active_codes.json
          git diff --staged --quiet || git commit -m "Update CW codes snapshot $(date -u +'%Y-%m-%d')"
          git pull --rebase || true
          git push

      - name: Upload Excel files as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cw-report-${{ github.run_number }}
          path: output/*.xlsx
          retention-days: 30
